<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Notion Theme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- Mobile Header -->
    <div class="mobile-header">
      <button class="menu-btn" id="menuBtn" aria-label="Open menu">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="5" x2="18" y2="5"></line>
          <line x1="2" y1="10" x2="18" y2="10"></line>
          <line x1="2" y1="15" x2="18" y2="15"></line>
        </svg>
      </button>
      <span class="logo">Tasks</span>
      <div style="width: 34px;"></div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="workspace-avatar">T</div>
        <span class="logo">My Workspace</span>
      </div>

      <nav class="nav-section">
        <div class="nav-label">Pages</div>

        <div class="nav-item active" data-view="inbox" tabindex="0" role="button">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M22 12h-6l-2 3h-4l-2-3H2"></path>
            <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"></path>
          </svg>
          <span>Inbox</span>
          <span class="nav-count" id="inboxCount">0</span>
        </div>

        <div class="nav-item" data-view="today" tabindex="0" role="button">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span>Today</span>
          <span class="nav-count" id="todayCount">0</span>
        </div>

        <div class="nav-item" data-view="upcoming" tabindex="0" role="button">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <span>Upcoming</span>
          <span class="nav-count" id="upcomingCount">0</span>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="page-header">
        <span class="page-emoji" id="pageEmoji">📥</span>
        <h1 class="page-title" id="pageTitle">Inbox</h1>
        <p class="page-subtitle" id="pageSubtitle">All your tasks in one place</p>
      </div>

      <!-- Task Input -->
      <div class="task-input-wrapper">
        <div class="task-input-container">
          <div class="input-plus">+</div>
          <input
            type="text"
            class="task-input"
            id="taskInput"
            placeholder="New task..."
            aria-label="New task input"
          >
          <button class="add-btn" id="addBtn" aria-label="Add task">
            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <!-- Task List -->
      <div class="task-list" id="taskList"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
